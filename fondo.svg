<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Fondo mistico negro y dorado - Alta Magia Daniel">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#1a0f05"/>
      <stop offset="55%" stop-color="#0b0603"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>

    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8a6a20"/>
      <stop offset="45%" stop-color="#e8c874"/>
      <stop offset="55%" stop-color="#f7e394"/>
      <stop offset="100%" stop-color="#8a6a20"/>
    </linearGradient>

    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4af37" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#d4af37" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
    </radialGradient>

    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>

    <filter id="halo" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>

    <pattern id="stars" x="0" y="0" width="220" height="220" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="35" r="0.8" fill="#e8c874" opacity="0.55"/>
      <circle cx="140" cy="80" r="0.5" fill="#f7e394" opacity="0.4"/>
      <circle cx="70" cy="160" r="1.1" fill="#d4af37" opacity="0.7"/>
      <circle cx="190" cy="200" r="0.6" fill="#e8c874" opacity="0.45"/>
      <circle cx="105" cy="50" r="0.4" fill="#f7e394" opacity="0.35"/>
      <circle cx="180" cy="140" r="0.7" fill="#d4af37" opacity="0.5"/>
      <circle cx="40" cy="200" r="0.5" fill="#e8c874" opacity="0.4"/>
    </pattern>

    <symbol id="star4" viewBox="-10 -10 20 20">
      <path d="M0,-10 L2,-2 L10,0 L2,2 L0,10 L-2,2 L-10,0 L-2,-2 Z" fill="url(#goldGrad)"/>
    </symbol>
  </defs>

  <!-- Fondo -->
  <rect width="1600" height="900" fill="url(#bgGrad)"/>
  <rect width="1600" height="900" fill="url(#stars)"/>

  <!-- Halo central -->
  <circle cx="800" cy="450" r="520" fill="url(#glow)"/>

  <!-- Marco decorativo -->
  <rect x="40" y="40" width="1520" height="820" fill="none" stroke="url(#goldGrad)" stroke-width="1.2" opacity="0.75"/>
  <rect x="52" y="52" width="1496" height="796" fill="none" stroke="#d4af37" stroke-width="0.4" opacity="0.5"/>

  <!-- Esquinas ornamentales -->
  <g fill="none" stroke="url(#goldGrad)" stroke-width="1.1" opacity="0.9">
    <g>
      <path d="M40,120 Q40,40 120,40"/>
      <path d="M70,40 Q70,70 40,70" opacity="0.6"/>
      <circle cx="80" cy="80" r="3" fill="#d4af37" stroke="none"/>
    </g>
    <g transform="translate(1600,0) scale(-1,1)">
      <path d="M40,120 Q40,40 120,40"/>
      <path d="M70,40 Q70,70 40,70" opacity="0.6"/>
      <circle cx="80" cy="80" r="3" fill="#d4af37" stroke="none"/>
    </g>
    <g transform="translate(0,900) scale(1,-1)">
      <path d="M40,120 Q40,40 120,40"/>
      <path d="M70,40 Q70,70 40,70" opacity="0.6"/>
      <circle cx="80" cy="80" r="3" fill="#d4af37" stroke="none"/>
    </g>
    <g transform="translate(1600,900) scale(-1,-1)">
      <path d="M40,120 Q40,40 120,40"/>
      <path d="M70,40 Q70,70 40,70" opacity="0.6"/>
      <circle cx="80" cy="80" r="3" fill="#d4af37" stroke="none"/>
    </g>
  </g>

  <!-- Sello central -->
  <g transform="translate(800 450)">
    <!-- resplandor -->
    <circle r="260" fill="#d4af37" opacity="0.05" filter="url(#halo)"/>

    <!-- Anillos concentricos -->
    <circle r="240" fill="none" stroke="url(#goldGrad)" stroke-width="1" opacity="0.55"/>
    <circle r="220" fill="none" stroke="#d4af37" stroke-width="0.4" opacity="0.4" stroke-dasharray="2 4"/>
    <circle r="180" fill="none" stroke="url(#goldGrad)" stroke-width="1.4" opacity="0.9"/>
    <circle r="178" fill="none" stroke="#d4af37" stroke-width="0.3" opacity="0.5"/>
    <circle r="120" fill="none" stroke="url(#goldGrad)" stroke-width="0.8" opacity="0.7"/>

    <!-- Runas / marcas alrededor del anillo -->
    <g fill="#e8c874" opacity="0.85" font-family="Georgia, serif" font-size="14" letter-spacing="6" text-anchor="middle">
      <g transform="rotate(0)"><text y="-200">✦</text></g>
      <g transform="rotate(30)"><text y="-200">☉</text></g>
      <g transform="rotate(60)"><text y="-200">☽</text></g>
      <g transform="rotate(90)"><text y="-200">✦</text></g>
      <g transform="rotate(120)"><text y="-200">♆</text></g>
      <g transform="rotate(150)"><text y="-200">☿</text></g>
      <g transform="rotate(180)"><text y="-200">✦</text></g>
      <g transform="rotate(210)"><text y="-200">♄</text></g>
      <g transform="rotate(240)"><text y="-200">♃</text></g>
      <g transform="rotate(270)"><text y="-200">✦</text></g>
      <g transform="rotate(300)"><text y="-200">♀</text></g>
      <g transform="rotate(330)"><text y="-200">♂</text></g>
    </g>

    <!-- Estrella de 8 puntas (mistica) -->
    <g opacity="0.95">
      <polygon points="0,-150 22,-22 150,0 22,22 0,150 -22,22 -150,0 -22,-22"
               fill="none" stroke="url(#goldGrad)" stroke-width="1.2"/>
      <polygon points="0,-150 22,-22 150,0 22,22 0,150 -22,22 -150,0 -22,-22"
               transform="rotate(45)"
               fill="none" stroke="url(#goldGrad)" stroke-width="1.2" opacity="0.75"/>
    </g>

    <!-- Triangulo alquimico -->
    <polygon points="0,-90 78,45 -78,45" fill="none" stroke="#d4af37" stroke-width="1" opacity="0.9"/>
    <line x1="-78" y1="0" x2="78" y2="0" stroke="#d4af37" stroke-width="0.6" opacity="0.6"/>

    <!-- Ojo central -->
    <g filter="url(#soft)">
      <ellipse rx="42" ry="22" fill="none" stroke="url(#goldGrad)" stroke-width="1.6"/>
      <circle r="12" fill="#0b0603" stroke="#d4af37" stroke-width="1"/>
      <circle r="4" fill="#f7e394"/>
    </g>
    <g stroke="#d4af37" stroke-width="0.6" opacity="0.7">
      <line x1="-70" y1="0" x2="-52" y2="0"/>
      <line x1="52" y1="0" x2="70" y2="0"/>
    </g>

    <!-- Iniciales -->
    <text y="90" text-anchor="middle" font-family="Georgia, serif" font-size="26" letter-spacing="10" fill="url(#goldGrad)">A · M</text>
    <text y="115" text-anchor="middle" font-family="Georgia, serif" font-size="10" letter-spacing="6" fill="#e8c874" opacity="0.75">DANIEL</text>
  </g>

  <!-- Rayos de luz sutiles desde el sello -->
  <g stroke="#d4af37" stroke-width="0.4" opacity="0.18" transform="translate(800 450)">
    <line x1="0" y1="-260" x2="0" y2="-430"/>
    <line x1="0" y1="260" x2="0" y2="430"/>
    <line x1="-260" y1="0" x2="-780" y2="0"/>
    <line x1="260" y1="0" x2="780" y2="0"/>
    <line x1="-184" y1="-184" x2="-460" y2="-460"/>
    <line x1="184" y1="-184" x2="460" y2="-460"/>
    <line x1="-184" y1="184" x2="-460" y2="460"/>
    <line x1="184" y1="184" x2="460" y2="460"/>
  </g>

  <!-- Estrellas decorativas dispersas -->
  <use href="#star4" x="200" y="180" width="16" height="16" opacity="0.85"/>
  <use href="#star4" x="1380" y="220" width="20" height="20" opacity="0.9"/>
  <use href="#star4" x="260" y="720" width="18" height="18" opacity="0.85"/>
  <use href="#star4" x="1340" y="700" width="14" height="14" opacity="0.75"/>
  <use href="#star4" x="120" y="450" width="12" height="12" opacity="0.6"/>
  <use href="#star4" x="1470" y="460" width="12" height="12" opacity="0.6"/>

  <!-- Luna creciente arriba izquierda -->
  <g transform="translate(180 140)" opacity="0.9">
    <circle r="26" fill="none" stroke="url(#goldGrad)" stroke-width="1"/>
    <path d="M-8,-18 A22,22 0 1 0 -8,18 A18,18 0 1 1 -8,-18 Z" fill="url(#goldGrad)"/>
  </g>

  <!-- Sol estilizado arriba derecha -->
  <g transform="translate(1420 150)" opacity="0.9">
    <circle r="18" fill="none" stroke="url(#goldGrad)" stroke-width="1.2"/>
    <circle r="8" fill="url(#goldGrad)"/>
    <g stroke="url(#goldGrad)" stroke-width="1">
      <line x1="0" y1="-28" x2="0" y2="-38"/>
      <line x1="0" y1="28" x2="0" y2="38"/>
      <line x1="-28" y1="0" x2="-38" y2="0"/>
      <line x1="28" y1="0" x2="38" y2="0"/>
      <line x1="-20" y1="-20" x2="-27" y2="-27"/>
      <line x1="20" y1="-20" x2="27" y2="-27"/>
      <line x1="-20" y1="20" x2="-27" y2="27"/>
      <line x1="20" y1="20" x2="27" y2="27"/>
    </g>
  </g>

  <!-- Viñeta oscura -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
    <stop offset="60%" stop-color="#000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0.7"/>
  </radialGradient>
  <rect width="1600" height="900" fill="url(#vignette)"/>
</svg>
