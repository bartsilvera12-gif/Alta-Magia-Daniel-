<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Panel · Alta Magia Daniel</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" href="/favicon-md.png?v=20260710">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;800&family=Cormorant+Garamond:ital@0;1&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root { --gold:#d4af37; --gold-soft:#e8c874; --gold-bright:#f3d987; --text:#cbbfa4; --muted:#8f8570; --line:rgba(212,175,55,.2); --card:rgba(13,10,7,.55); }
    body { min-height:100vh; color:var(--text); font-family:'Cormorant Garamond',Georgia,serif; font-size:16px;
      background:radial-gradient(120% 90% at 50% 0%, #140c05 0%, #0b0603 55%, #000 100%) fixed, #060403; }
    a { color:inherit; }
    #gate { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:#060403; z-index:50;
      font-family:'Cinzel',serif; letter-spacing:2px; color:var(--gold-soft); font-size:13px; }
    .spin { display:inline-block; width:16px; height:16px; border:2px solid rgba(212,175,55,.3); border-top-color:var(--gold);
      border-radius:50%; animation:spin .7s linear infinite; margin-right:10px; vertical-align:-3px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    @media (prefers-reduced-motion: reduce){ .spin{ animation:none; } }

    #app { display:none; min-height:100vh; grid-template-columns:250px 1fr; }
    aside { border-right:1px solid var(--line); background:rgba(6,4,3,.6); padding:20px 14px; }
    .brand { display:flex; align-items:center; gap:11px; margin-bottom:22px; }
    .brand img { width:40px; height:40px; border-radius:50%; object-fit:cover; border:1.5px solid rgba(212,175,55,.6); background:#000; }
    .brand b { font-family:'Cinzel',serif; font-weight:700; font-size:13px; letter-spacing:2px; color:var(--gold-bright); }
    .brand span { display:block; font-size:10px; letter-spacing:2px; color:var(--muted); }
    #nav a { display:block; padding:10px 12px; border-radius:8px; margin-bottom:2px; text-decoration:none;
      font-family:'Cinzel',serif; font-size:12px; letter-spacing:.8px; color:var(--text); }
    #nav a:hover { background:rgba(212,175,55,.08); }
    #nav a[aria-current="page"] { background:linear-gradient(135deg,rgba(212,175,55,.22),rgba(212,175,55,.05)); color:var(--gold-bright); }
    .nav-group { font-family:'Cinzel',serif; font-size:10px; letter-spacing:2px; color:var(--muted); margin:14px 12px 6px; }

    header { display:flex; align-items:center; justify-content:space-between; padding:16px 26px; border-bottom:1px solid var(--line); position:sticky; top:0; background:rgba(6,4,3,.85); backdrop-filter:blur(6px); z-index:10; }
    header .who { font-size:15px; }
    header .who b { color:var(--gold-bright); font-family:'Cinzel',serif; font-size:13px; letter-spacing:1px; }
    .role { font-family:'Cinzel',serif; font-size:9px; letter-spacing:1.5px; color:#0d0a06; background:linear-gradient(135deg,#fbf0c4,#e6c56e,#b98d22); padding:3px 9px; border-radius:999px; margin-left:8px; }
    .logout { cursor:pointer; font-family:'Cinzel',serif; font-size:11px; letter-spacing:1.5px; color:var(--gold-soft); background:transparent; border:1px solid var(--line); padding:8px 15px; border-radius:999px; }
    .logout:hover { border-color:rgba(212,175,55,.6); }
    main#view { padding:26px 28px 60px; max-width:1100px; }

    .crumbs { font-family:'Cinzel',serif; font-size:10px; letter-spacing:2px; color:var(--muted); margin-bottom:10px; text-transform:uppercase; }
    .crumbs a { color:var(--gold-soft); text-decoration:none; }
    h1 { font-family:'Cinzel',serif; font-weight:800; font-size:clamp(24px,3.5vw,34px);
      background:linear-gradient(180deg,#fbf0c4,#d4af37,#9a7418); -webkit-background-clip:text; background-clip:text; color:transparent; }
    .lead { font-style:italic; color:var(--muted); margin:4px 0 22px; }
    .head-row { display:flex; align-items:center; justify-content:space-between; gap:14px; margin-bottom:16px; }
    .muted { color:var(--muted); } .err { color:#ff9a9a; }

    .btn { font-family:'Cinzel',serif; font-weight:600; font-size:12px; letter-spacing:1.5px; color:#0d0a06; cursor:pointer;
      background:linear-gradient(135deg,#fbf0c4,#e6c56e,#b98d22); border:none; padding:11px 22px; border-radius:999px; text-decoration:none; display:inline-block; }
    .btn:hover { filter:brightness(1.05); }
    .btn-ghost { font-family:'Cinzel',serif; font-size:11px; letter-spacing:1.5px; color:var(--gold-soft); cursor:pointer;
      background:transparent; border:1px solid var(--line); padding:11px 20px; border-radius:999px; text-decoration:none; display:inline-block; }
    .btn-danger { font-family:'Cinzel',serif; font-size:11px; letter-spacing:1px; color:#fff; cursor:pointer;
      background:linear-gradient(135deg,#c0392b,#7c211a); border:none; padding:11px 20px; border-radius:999px; }

    .stats { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:14px; max-width:820px; }
    .stat { border:1px solid var(--line); border-radius:14px; padding:16px 18px; background:var(--card); }
    .stat .n { font-family:'Cinzel',serif; font-weight:800; font-size:28px; color:var(--gold-bright); }
    .stat .l { font-size:13px; color:var(--muted); margin-top:2px; }
    .qa { margin-top:22px; display:flex; flex-wrap:wrap; gap:10px; }
    .chip { font-family:'Cinzel',serif; font-size:11px; letter-spacing:1px; color:var(--gold-soft); border:1px solid var(--line); padding:9px 16px; border-radius:999px; text-decoration:none; }
    .chip:hover { border-color:rgba(212,175,55,.6); }

    .search { width:100%; max-width:340px; margin-bottom:14px; background:rgba(0,0,0,.4); border:1px solid var(--line); border-radius:10px; padding:10px 13px; color:#f4ecd8; font-family:'Cormorant Garamond',serif; font-size:16px; outline:none; }
    .search:focus { border-color:rgba(212,175,55,.6); }
    .tbl-wrap { overflow-x:auto; border:1px solid var(--line); border-radius:12px; }
    .tbl { width:100%; border-collapse:collapse; font-size:15px; }
    .tbl th { text-align:left; font-family:'Cinzel',serif; font-size:10px; letter-spacing:1.5px; color:var(--muted); padding:12px 14px; border-bottom:1px solid var(--line); white-space:nowrap; }
    .tbl td { padding:10px 14px; border-bottom:1px solid rgba(212,175,55,.08); vertical-align:middle; }
    .tbl tr:last-child td { border-bottom:none; }
    .ta-r { text-align:right; }
    .thumb { width:42px; height:42px; border-radius:8px; object-fit:cover; border:1px solid var(--line); display:block; }
    .thumb.ph { background:rgba(212,175,55,.06); }
    .acts { white-space:nowrap; }
    .acts button, .acts a { margin-left:5px; }
    .acts button { background:transparent; border:1px solid var(--line); color:var(--muted); width:28px; height:28px; border-radius:7px; cursor:pointer; font-size:12px; }
    .acts button:hover:not(:disabled) { border-color:rgba(212,175,55,.6); color:var(--gold-soft); }
    .acts button:disabled { opacity:.3; cursor:default; }
    .acts button.on { color:var(--gold-bright); border-color:rgba(212,175,55,.6); }
    .mini { font-family:'Cinzel',serif; font-size:10px; letter-spacing:1px; color:var(--gold-soft); border:1px solid var(--line); padding:6px 11px; border-radius:7px; text-decoration:none; cursor:pointer; background:transparent; }
    .mini:hover { border-color:rgba(212,175,55,.6); }
    .mini.del { color:#ff9a9a; }

    .form { max-width:640px; }
    .field { margin-bottom:16px; }
    .field label { display:block; font-family:'Cinzel',serif; font-size:11px; letter-spacing:1.2px; color:var(--gold-soft); margin-bottom:6px; }
    .field input[type=text], .field input[type=number], .field textarea, .field select {
      width:100%; background:rgba(0,0,0,.4); border:1px solid var(--line); border-radius:10px; padding:11px 13px;
      color:#f4ecd8; font-family:'Cormorant Garamond',serif; font-size:16px; outline:none; }
    .field textarea { resize:vertical; line-height:1.5; }
    .field input:focus, .field textarea:focus, .field select:focus { border-color:rgba(212,175,55,.6); }
    .field input[readonly], .field textarea[readonly] { opacity:.7; }
    .switch { display:inline-flex; align-items:center; gap:10px; cursor:pointer; }
    .switch input { width:18px; height:18px; accent-color:#d4af37; }
    .help { font-size:13px; color:var(--muted); margin-top:4px; font-style:italic; }
    .img-field { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
    .img-prev { width:80px; height:80px; border-radius:10px; border:1px solid var(--line); background:rgba(0,0,0,.4); display:flex; align-items:center; justify-content:center; overflow:hidden; font-size:11px; color:var(--muted); }
    .img-prev img { width:100%; height:100%; object-fit:cover; }
    .img-field input[type=file] { font-size:13px; color:var(--muted); }
    .form-actions { display:flex; gap:12px; align-items:center; margin-top:22px; }

    .modal-ov { position:fixed; inset:0; background:rgba(0,0,0,.72); display:flex; align-items:center; justify-content:center; z-index:100; padding:20px; }
    .modal { background:linear-gradient(180deg,#0d0a07,#060403); border:1px solid var(--line); border-radius:16px; padding:26px; max-width:400px; text-align:center; }
    .modal p { font-size:17px; margin-bottom:18px; }
    .modal-actions { display:flex; gap:12px; justify-content:center; }
    .toast { position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(20px); z-index:120; opacity:0; pointer-events:none;
      background:rgba(13,10,7,.97); border:1px solid rgba(212,175,55,.5); color:var(--gold-bright); font-family:'Cinzel',serif; font-size:12px; letter-spacing:.5px; padding:12px 22px; border-radius:999px; transition:opacity .25s, transform .25s; }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
    .toast.err { border-color:rgba(224,80,80,.5); color:#ff9a9a; }
    @media (max-width:820px){ #app{ grid-template-columns:1fr; } aside{ border-right:none; border-bottom:1px solid var(--line); } }
    /* Responsive tables: each row becomes a stacked card (no horizontal scroll) */
    @media (max-width:680px){
      main#view { padding:20px 14px 50px; }
      header { padding:14px 16px; }
      .head-row { flex-wrap:wrap; }
      .tbl-wrap { overflow:visible; border:none; }
      .tbl, .tbl tbody, .tbl tr, .tbl td { display:block; width:100%; }
      .tbl thead { position:absolute; left:-9999px; }
      .tbl tr { border:1px solid var(--line); border-radius:12px; margin-bottom:12px; padding:4px 4px 8px; background:var(--card); }
      .tbl td { border:none; padding:8px 12px; display:flex; align-items:center; justify-content:space-between; gap:14px; text-align:left; }
      .tbl td::before { content:attr(data-label); font-family:'Cinzel',serif; font-size:10px; letter-spacing:1px; color:var(--muted); flex:0 0 auto; }
      .tbl td.imgcell { justify-content:center; padding-top:12px; }
      .tbl td.imgcell::before { display:none; }
      .tbl td.imgcell .thumb { width:72px; height:72px; }
      .tbl td.acts { justify-content:flex-start; flex-wrap:wrap; gap:6px; }
      .tbl td.acts::before { display:none; }
      .form, .search { max-width:100%; }
      .stats { grid-template-columns:1fr 1fr; }
    }
  </style>
</head>
<body>
  <div id="gate"><span class="spin"></span> Verificando acceso…</div>

  <div id="app">
    <aside>
      <div class="brand">
        <img src="/favicon-md.png?v=20260710" alt="">
        <span><b>ALTA MAGIA</b><span>PANEL ADMIN</span></span>
      </div>
      <nav id="nav"></nav>
    </aside>
    <div>
      <header>
        <div class="who">Hola, <b id="adminName">—</b><span class="role" id="adminRole">—</span></div>
        <button class="logout" id="logoutBtn">Cerrar sesión</button>
      </header>
      <main id="view"></main>
    </div>
  </div>

  <script src="/admin/config.js"></script>
  <script type="module" src="/admin/app.js"></script>
</body>
</html>
