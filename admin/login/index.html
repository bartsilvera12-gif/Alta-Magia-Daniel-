<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Panel · Alta Magia Daniel</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" href="/favicon-md.png?v=20260710">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;800&family=Cormorant+Garamond:ital@0;1&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --gold:#d4af37; --gold-soft:#e8c874; --gold-bright:#f3d987; --text:#cbbfa4; --muted:#8f8570; --line:rgba(212,175,55,.25); }
    html, body { height: 100%; }
    body {
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;
      color: var(--text); font-family: 'Cormorant Garamond', Georgia, serif;
      background: radial-gradient(120% 90% at 50% 0%, #1a0f05 0%, #0b0603 55%, #000 100%) fixed, #060403;
    }
    .card {
      width: 100%; max-width: 420px;
      background: linear-gradient(180deg, rgba(20,14,7,.82), rgba(6,4,3,.9));
      border: 1px solid var(--line); border-radius: 18px;
      box-shadow: 0 24px 70px rgba(0,0,0,.6); padding: 40px 30px 30px; text-align: center;
    }
    .logo { width: 72px; height: 72px; border-radius: 50%; object-fit: cover; margin: 0 auto 16px;
      border: 1.5px solid rgba(212,175,55,.6); box-shadow: 0 0 22px rgba(212,175,55,.3); background:#000; }
    .kicker { font-family:'Cinzel',serif; font-size:11px; letter-spacing:4px; color:var(--gold); font-weight:700; }
    h1 { font-family:'Cinzel',serif; font-weight:800; font-size:26px; letter-spacing:1px; margin:6px 0 4px;
      background:linear-gradient(180deg,#fbf0c4,#d4af37,#9a7418); -webkit-background-clip:text; background-clip:text; color:transparent; }
    .sub { font-style: italic; font-size: 15px; color: var(--muted); margin-bottom: 26px; }
    form { text-align: left; }
    label { display:block; font-family:'Cinzel',serif; font-size:11px; letter-spacing:1.5px; color:var(--gold-soft); margin:0 0 6px; }
    .field { margin-bottom: 18px; }
    .input-wrap { position: relative; }
    input { width:100%; background:rgba(0,0,0,.45); border:1px solid var(--line); border-radius:10px;
      padding:13px 14px; color:#f4ecd8; font-family:'Cormorant Garamond',serif; font-size:17px; outline:none; transition:border-color .2s; }
    input:focus { border-color: rgba(212,175,55,.7); }
    .toggle { position:absolute; right:8px; top:50%; transform:translateY(-50%); background:none; border:none;
      color:var(--gold-soft); cursor:pointer; font-family:'Cinzel',serif; font-size:10px; letter-spacing:1px; padding:8px; }
    .btn { width:100%; margin-top:4px; cursor:pointer; border:none; border-radius:999px; padding:15px;
      font-family:'Cinzel',serif; font-weight:600; font-size:14px; letter-spacing:1.5px; color:#0d0a06;
      background:linear-gradient(135deg,#fbf0c4,#e6c56e,#b98d22); box-shadow:0 12px 30px rgba(212,175,55,.3);
      transition:filter .2s, opacity .2s; }
    .btn:hover { filter:brightness(1.05); }
    .btn:disabled { opacity:.6; cursor:not-allowed; }
    .msg { margin-top:16px; font-size:14px; border-radius:10px; padding:11px 14px; display:none; text-align:center; }
    .msg.error { display:block; background:rgba(120,20,25,.35); border:1px solid rgba(224,80,80,.4); color:#ff9a9a; }
    .msg.info  { display:block; background:rgba(212,175,55,.12); border:1px solid var(--line); color:var(--gold-soft); }
    .back { display:inline-block; margin-top:22px; font-family:'Cinzel',serif; font-size:11px; letter-spacing:2px;
      color:var(--muted); text-decoration:none; }
    .back:hover { color: var(--gold-soft); }
    .spin { display:inline-block; width:15px; height:15px; border:2px solid rgba(13,10,6,.35);
      border-top-color:#0d0a06; border-radius:50%; animation:spin .7s linear infinite; vertical-align:-2px; margin-right:8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (prefers-reduced-motion: reduce) { .spin { animation: none; } }
  </style>
</head>
<body>
  <main class="card">
    <img class="logo" src="/favicon-md.png?v=20260710" alt="Alta Magia Daniel">
    <div class="kicker">ALTA MAGIA DANIEL</div>
    <h1>Panel Administrador</h1>
    <p class="sub">Ingresá con tu cuenta autorizada.</p>

    <form id="loginForm" novalidate>
      <div class="field">
        <label for="email">Correo</label>
        <input id="email" name="email" type="email" autocomplete="username" required
               placeholder="tu@correo.com" aria-describedby="msg">
      </div>
      <div class="field">
        <label for="password">Contraseña</label>
        <div class="input-wrap">
          <input id="password" name="password" type="password" autocomplete="current-password" required
                 placeholder="••••••••" aria-describedby="msg">
          <button type="button" class="toggle" id="togglePw" aria-label="Mostrar u ocultar contraseña">VER</button>
        </div>
      </div>
      <button class="btn" id="submitBtn" type="submit">Ingresar al panel</button>
      <div class="msg" id="msg" role="alert" aria-live="polite"></div>
    </form>

    <a class="back" href="/">← Volver al sitio</a>
  </main>

  <script src="/admin/config.js"></script>
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const cfg = window.AMD_SUPABASE || {};
    const form = document.getElementById('loginForm');
    const btn = document.getElementById('submitBtn');
    const msgEl = document.getElementById('msg');
    const emailEl = document.getElementById('email');
    const pwEl = document.getElementById('password');

    function show(type, text) { msgEl.className = 'msg ' + type; msgEl.textContent = text; }
    function loading(on) {
      btn.disabled = on;
      btn.innerHTML = on ? '<span class="spin"></span>Ingresando…' : 'Ingresar al panel';
    }

    // Show/hide password
    document.getElementById('togglePw').addEventListener('click', () => {
      const isPw = pwEl.type === 'password';
      pwEl.type = isPw ? 'text' : 'password';
      document.getElementById('togglePw').textContent = isPw ? 'OCULTAR' : 'VER';
    });

    if (!cfg.url || !cfg.anonKey) {
      show('info', 'El panel todavía no está conectado a Supabase. Completá /admin/config.js con la URL y la anon key.');
      btn.disabled = true;
    }

    const supabase = (cfg.url && cfg.anonKey)
      ? createClient(cfg.url, cfg.anonKey, {
          auth: { persistSession: true, autoRefreshToken: true, storageKey: 'amd-admin-auth' },
          db: { schema: cfg.schema || 'altamagiadaniel' }
        })
      : null;

    // Already logged in? go to panel.
    if (supabase) {
      supabase.auth.getSession().then(({ data }) => {
        if (data && data.session) location.replace('/admin');
      });
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!supabase) return;
      const email = emailEl.value.trim();
      const password = pwEl.value;
      if (!email || !password) { show('error', 'Completá correo y contraseña.'); return; }

      show('info', ''); msgEl.className = 'msg';
      loading(true);
      try {
        const { data: signIn, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) { show('error', 'Correo o contraseña incorrectos.'); loading(false); return; }

        // Verify an ACTIVE admin profile exists.
        const uid = signIn.user.id;
        const { data: profile, error: pErr } = await supabase
          .from('admin_profiles')
          .select('id, role, is_active')
          .eq('user_id', uid)
          .maybeSingle();

        if (pErr || !profile || !profile.is_active) {
          await supabase.auth.signOut();
          show('error', 'No tenés acceso al panel administrativo.');
          loading(false);
          return;
        }

        // best-effort last_login (ignore failures)
        supabase.from('admin_profiles').update({ last_login_at: new Date().toISOString() }).eq('id', profile.id);

        location.replace('/admin');
      } catch (err) {
        show('error', 'No se pudo conectar con el servidor. Intentá de nuevo.');
        loading(false);
      }
    });
  </script>
</body>
</html>
