<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" aria-label="Luna y constelacion">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0603"/><stop offset="60%" stop-color="#1a0f05"/><stop offset="100%" stop-color="#000"/>
    </linearGradient>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8a6a20"/><stop offset="50%" stop-color="#f7e394"/><stop offset="100%" stop-color="#8a6a20"/>
    </linearGradient>
    <radialGradient id="moon" cx="35%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#f7e394"/><stop offset="70%" stop-color="#d4af37"/><stop offset="100%" stop-color="#8a6a20"/>
    </radialGradient>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f7e394" stop-opacity=".35"/><stop offset="100%" stop-color="#f7e394" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="8"/></filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Constelacion (linea que conecta estrellas) -->
  <g stroke="#d4af37" stroke-width=".6" opacity=".45" fill="none">
    <path d="M180,180 L340,120 L510,220 L680,150 L840,260 L1000,180 L1180,290 L1360,200 L1500,340"/>
    <path d="M340,120 L400,290 L510,220"/>
    <path d="M680,150 L780,340 L840,260"/>
    <path d="M1000,180 L1080,360 L1180,290"/>
  </g>
  <g fill="#f7e394">
    <circle cx="180" cy="180" r="2.4"/><circle cx="340" cy="120" r="2.8"/><circle cx="510" cy="220" r="2"/>
    <circle cx="680" cy="150" r="2.6"/><circle cx="840" cy="260" r="2.2"/><circle cx="1000" cy="180" r="2.8"/>
    <circle cx="1180" cy="290" r="2"/><circle cx="1360" cy="200" r="2.6"/><circle cx="1500" cy="340" r="2.4"/>
    <circle cx="400" cy="290" r="1.8"/><circle cx="780" cy="340" r="1.8"/><circle cx="1080" cy="360" r="1.8"/>
  </g>

  <!-- Estrellas pequeñas dispersas -->
  <g fill="#e8c874">
    <circle cx="80" cy="90" r=".8" opacity=".55"/><circle cx="220" cy="380" r=".9" opacity=".5"/>
    <circle cx="600" cy="80" r=".7" opacity=".5"/><circle cx="900" cy="420" r=".8" opacity=".55"/>
    <circle cx="1250" cy="90" r="1" opacity=".6"/><circle cx="1450" cy="500" r=".8" opacity=".5"/>
    <circle cx="140" cy="620" r=".7" opacity=".45"/><circle cx="1520" cy="720" r=".9" opacity=".55"/>
    <circle cx="440" cy="720" r=".6" opacity=".4"/><circle cx="1100" cy="750" r=".7" opacity=".45"/>
  </g>

  <!-- Luna grande a la derecha -->
  <g transform="translate(1200 550)">
    <circle r="220" fill="url(#moonGlow)" filter="url(#blur)"/>
    <circle r="150" fill="url(#moon)"/>
    <g fill="#8a6a20" opacity=".35">
      <circle cx="-40" cy="-30" r="18"/><circle cx="30" cy="20" r="26"/>
      <circle cx="-20" cy="60" r="14"/><circle cx="60" cy="-50" r="10"/>
      <circle cx="50" cy="80" r="16"/>
    </g>
    <circle r="150" fill="none" stroke="#f7e394" stroke-width="1" opacity=".6"/>
    <circle r="170" fill="none" stroke="#d4af37" stroke-width=".4" opacity=".4" stroke-dasharray="3 6"/>
  </g>

  <!-- Silueta de arboles inferior -->
  <g fill="#000">
    <path d="M0,900 L0,760 Q60,720 90,740 L120,700 L150,730 L200,690 L230,720 L280,700 L320,750 L360,720 L400,760 L450,720 L500,760 L540,700 L580,740 L640,710 L690,750 L740,720 L800,760 L860,710 L920,740 L980,700 L1050,750 L1120,720 L1180,760 L1240,730 L1300,700 L1360,740 L1420,720 L1480,760 L1560,720 L1600,760 L1600,900 Z"/>
  </g>

  <!-- Neblina base -->
  <ellipse cx="800" cy="820" rx="900" ry="80" fill="#d4af37" opacity=".05"/>
</svg>
