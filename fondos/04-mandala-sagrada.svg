<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" aria-label="Mandala geometria sagrada">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#1a0f05"/><stop offset="55%" stop-color="#0b0603"/><stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8a6a20"/><stop offset="50%" stop-color="#f7e394"/><stop offset="100%" stop-color="#8a6a20"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4af37" stop-opacity=".3"/><stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
    </radialGradient>
    <symbol id="petal" viewBox="-50 -100 100 100">
      <path d="M0,0 Q-30,-50 0,-100 Q30,-50 0,0 Z" fill="none" stroke="url(#g)" stroke-width="1"/>
    </symbol>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="800" cy="450" r="600" fill="url(#glow)"/>

  <g transform="translate(800 450)" opacity=".95">
    <!-- Flor de la vida (6 petalos + centro) -->
    <g fill="none" stroke="url(#g)" stroke-width=".8" opacity=".6">
      <circle r="60"/>
      <g><circle cx="0" cy="-60" r="60"/><circle cx="52" cy="-30" r="60"/><circle cx="52" cy="30" r="60"/>
         <circle cx="0" cy="60" r="60"/><circle cx="-52" cy="30" r="60"/><circle cx="-52" cy="-30" r="60"/></g>
      <g opacity=".7">
        <circle cx="0" cy="-120" r="60"/><circle cx="104" cy="-60" r="60"/><circle cx="104" cy="60" r="60"/>
        <circle cx="0" cy="120" r="60"/><circle cx="-104" cy="60" r="60"/><circle cx="-104" cy="-60" r="60"/>
        <circle cx="90" cy="0" r="60"/><circle cx="-90" cy="0" r="60"/>
      </g>
    </g>

    <!-- Anillos exteriores -->
    <circle r="200" fill="none" stroke="url(#g)" stroke-width="1.2"/>
    <circle r="205" fill="none" stroke="#d4af37" stroke-width=".3" opacity=".5"/>
    <circle r="260" fill="none" stroke="url(#g)" stroke-width=".8" opacity=".65" stroke-dasharray="2 6"/>
    <circle r="320" fill="none" stroke="url(#g)" stroke-width=".6" opacity=".5"/>

    <!-- 12 petalos -->
    <g>
      <g transform="rotate(0)"><use href="#petal" x="-25" y="-250" width="50" height="50"/></g>
      <g transform="rotate(30)"><use href="#petal" x="-25" y="-250" width="50" height="50"/></g>
      <g transform="rotate(60)"><use href="#petal" x="-25" y="-250" width="50" height="50"/></g>
      <g transform="rotate(90)"><use href="#petal" x="-25" y="-250" width="50" height="50"/></g>
      <g transform="rotate(120)"><use href="#petal" x="-25" y="-250" width="50" height="50"/></g>
      <g transform="rotate(150)"><use href="#petal" x="-25" y="-250" width="50" height="50"/></g>
      <g transform="rotate(180)"><use href="#petal" x="-25" y="-250" width="50" height="50"/></g>
      <g transform="rotate(210)"><use href="#petal" x="-25" y="-250" width="50" height="50"/></g>
      <g transform="rotate(240)"><use href="#petal" x="-25" y="-250" width="50" height="50"/></g>
      <g transform="rotate(270)"><use href="#petal" x="-25" y="-250" width="50" height="50"/></g>
      <g transform="rotate(300)"><use href="#petal" x="-25" y="-250" width="50" height="50"/></g>
      <g transform="rotate(330)"><use href="#petal" x="-25" y="-250" width="50" height="50"/></g>
    </g>

    <!-- Puntos decorativos entre anillos -->
    <g fill="#d4af37" opacity=".8">
      <g transform="rotate(15)"><circle cx="0" cy="-230" r="2"/></g>
      <g transform="rotate(45)"><circle cx="0" cy="-230" r="2"/></g>
      <g transform="rotate(75)"><circle cx="0" cy="-230" r="2"/></g>
      <g transform="rotate(105)"><circle cx="0" cy="-230" r="2"/></g>
      <g transform="rotate(135)"><circle cx="0" cy="-230" r="2"/></g>
      <g transform="rotate(165)"><circle cx="0" cy="-230" r="2"/></g>
      <g transform="rotate(195)"><circle cx="0" cy="-230" r="2"/></g>
      <g transform="rotate(225)"><circle cx="0" cy="-230" r="2"/></g>
      <g transform="rotate(255)"><circle cx="0" cy="-230" r="2"/></g>
      <g transform="rotate(285)"><circle cx="0" cy="-230" r="2"/></g>
      <g transform="rotate(315)"><circle cx="0" cy="-230" r="2"/></g>
      <g transform="rotate(345)"><circle cx="0" cy="-230" r="2"/></g>
    </g>

    <!-- Nucleo central -->
    <circle r="8" fill="url(#g)"/>
    <circle r="16" fill="none" stroke="url(#g)" stroke-width="1"/>
  </g>

  <radialGradient id="v" cx="50%" cy="50%" r="80%"><stop offset="55%" stop-color="#000" stop-opacity="0"/><stop offset="100%" stop-color="#000" stop-opacity=".8"/></radialGradient>
  <rect width="1600" height="900" fill="url(#v)"/>
</svg>
