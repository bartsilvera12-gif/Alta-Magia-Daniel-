<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" preserveAspectRatio="xMidYMid slice" aria-label="Endulzamiento">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#2a1408"/><stop offset="60%" stop-color="#120904"/><stop offset="100%" stop-color="#050201"/>
    </radialGradient>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7e394"/><stop offset="50%" stop-color="#d4af37"/><stop offset="100%" stop-color="#8a6a20"/>
    </linearGradient>
    <linearGradient id="jar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a2612"/><stop offset="100%" stop-color="#1a0e05"/>
    </linearGradient>
    <linearGradient id="honey" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7e394"/><stop offset="50%" stop-color="#d4af37"/><stop offset="100%" stop-color="#8a6a20"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4af37" stop-opacity=".4"/><stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="6"/></filter>
  </defs>

  <rect width="400" height="260" fill="url(#bg)"/>
  <circle cx="200" cy="140" r="140" fill="url(#glow)" filter="url(#blur)"/>

  <!-- Estrellas -->
  <g fill="#e8c874">
    <circle cx="40" cy="40" r=".9" opacity=".55"/><circle cx="360" cy="50" r="1" opacity=".6"/>
    <circle cx="70" cy="200" r=".8" opacity=".5"/><circle cx="340" cy="210" r=".9" opacity=".55"/>
    <circle cx="30" cy="130" r=".6" opacity=".4"/><circle cx="370" cy="140" r=".7" opacity=".45"/>
  </g>

  <!-- Halo detrás del frasco -->
  <circle cx="200" cy="150" r="60" fill="none" stroke="url(#g)" stroke-width=".5" opacity=".4" stroke-dasharray="2 4"/>
  <circle cx="200" cy="150" r="52" fill="none" stroke="url(#g)" stroke-width=".8" opacity=".55"/>

  <!-- Frasco de miel -->
  <g transform="translate(200 150)">
    <!-- Cuerpo del frasco -->
    <path d="M-40,-40 Q-42,-30 -40,-20 L-40,50 Q-40,60 -30,62 L30,62 Q40,60 40,50 L40,-20 Q42,-30 40,-40 Z"
          fill="url(#jar)" stroke="url(#g)" stroke-width="1.4"/>
    <!-- Miel dentro (transparencia dorada) -->
    <path d="M-38,-10 L-38,48 Q-38,58 -28,60 L28,60 Q38,58 38,48 L38,-10 Q0,-4 -38,-10 Z"
          fill="url(#honey)" opacity=".85"/>
    <!-- Superficie de miel brillante -->
    <ellipse cy="-10" rx="38" ry="4" fill="#f7e394" opacity=".7"/>
    <!-- Tapa/borde superior -->
    <rect x="-45" y="-50" width="90" height="14" rx="3" fill="url(#g)" stroke="#8a6a20" stroke-width=".6"/>
    <line x1="-45" y1="-40" x2="45" y2="-40" stroke="#8a6a20" stroke-width=".4" opacity=".7"/>
    <!-- Etiqueta -->
    <rect x="-22" y="10" width="44" height="26" fill="none" stroke="url(#g)" stroke-width=".6" opacity=".8"/>
    <text y="24" text-anchor="middle" font-family="Georgia,serif" font-size="8" fill="#0a0503" letter-spacing="2" opacity=".9">DULCE</text>
    <text y="32" text-anchor="middle" font-family="Georgia,serif" font-size="5" fill="#0a0503" letter-spacing="1" opacity=".8">AMOR</text>
    <!-- Corazón grabado sobre la tapa -->
    <path d="M0,-58 C-5,-63 -10,-63 -10,-58 C-10,-53 -5,-52 0,-48 C5,-52 10,-53 10,-58 C10,-63 5,-63 0,-58 Z"
          fill="url(#g)" opacity=".95"/>
  </g>

  <!-- Gota de miel cayendo -->
  <g fill="url(#honey)" opacity=".9">
    <path d="M200,88 Q195,96 200,102 Q205,96 200,88 Z"/>
  </g>

  <!-- Panal de abejas (izq) -->
  <g transform="translate(80 130)" opacity=".7">
    <g fill="none" stroke="url(#g)" stroke-width=".8">
      <polygon points="0,-12 10,-6 10,6 0,12 -10,6 -10,-6"/>
      <polygon points="18,-6 28,0 28,12 18,18 8,12 8,0" transform="translate(0 -3)"/>
      <polygon points="-18,-6 -8,0 -8,12 -18,18 -28,12 -28,0" transform="translate(0 -3)"/>
      <polygon points="0,12 10,18 10,30 0,36 -10,30 -10,18"/>
    </g>
    <circle r="2" fill="url(#g)" opacity=".7"/>
  </g>

  <!-- Rosa (der) -->
  <g transform="translate(320 140)" opacity=".85">
    <g stroke="url(#g)" stroke-width=".8" fill="none">
      <circle r="18"/><circle r="12"/><circle r="6"/>
      <path d="M-18,0 Q-9,-11 0,-6 Q9,-11 18,0 Q9,11 0,6 Q-9,11 -18,0 Z"/>
    </g>
    <circle r="3" fill="url(#g)"/>
    <path d="M0,18 L-4,40 M0,18 L4,38" stroke="url(#g)" stroke-width=".6" opacity=".7"/>
    <path d="M-10,32 Q-16,28 -14,24 Q-7,30 -4,40" fill="url(#g)" opacity=".3"/>
    <path d="M10,30 Q16,26 14,22 Q7,28 4,38" fill="url(#g)" opacity=".3"/>
  </g>

  <!-- Estrellas doradas dispersas -->
  <g fill="url(#g)" opacity=".85">
    <g transform="translate(120 50)"><polygon points="0,-6 2,-2 6,0 2,2 0,6 -2,2 -6,0 -2,-2"/></g>
    <g transform="translate(280 60)"><polygon points="0,-5 2,-2 5,0 2,2 0,5 -2,2 -5,0 -2,-2"/></g>
    <g transform="translate(60 90)"><polygon points="0,-4 1.5,-1.5 4,0 1.5,1.5 0,4 -1.5,1.5 -4,0 -1.5,-1.5"/></g>
  </g>
</svg>
