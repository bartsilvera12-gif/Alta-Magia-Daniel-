<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" aria-label="Sello mistico">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#1a0f05"/><stop offset="55%" stop-color="#0b0603"/><stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8a6a20"/><stop offset="50%" stop-color="#f7e394"/><stop offset="100%" stop-color="#8a6a20"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4af37" stop-opacity=".35"/><stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="800" cy="450" r="520" fill="url(#glow)"/>
  <g transform="translate(800 450)">
    <circle r="240" fill="none" stroke="url(#g)" stroke-width="1" opacity=".55"/>
    <circle r="180" fill="none" stroke="url(#g)" stroke-width="1.4"/>
    <circle r="120" fill="none" stroke="url(#g)" stroke-width=".8" opacity=".7"/>
    <g fill="#e8c874" font-family="Georgia,serif" font-size="14" text-anchor="middle" opacity=".85">
      <g transform="rotate(0)"><text y="-200">✦</text></g><g transform="rotate(30)"><text y="-200">☉</text></g>
      <g transform="rotate(60)"><text y="-200">☽</text></g><g transform="rotate(90)"><text y="-200">✦</text></g>
      <g transform="rotate(120)"><text y="-200">♆</text></g><g transform="rotate(150)"><text y="-200">☿</text></g>
      <g transform="rotate(180)"><text y="-200">✦</text></g><g transform="rotate(210)"><text y="-200">♄</text></g>
      <g transform="rotate(240)"><text y="-200">♃</text></g><g transform="rotate(270)"><text y="-200">✦</text></g>
      <g transform="rotate(300)"><text y="-200">♀</text></g><g transform="rotate(330)"><text y="-200">♂</text></g>
    </g>
    <polygon points="0,-150 22,-22 150,0 22,22 0,150 -22,22 -150,0 -22,-22" fill="none" stroke="url(#g)" stroke-width="1.2"/>
    <polygon points="0,-150 22,-22 150,0 22,22 0,150 -22,22 -150,0 -22,-22" transform="rotate(45)" fill="none" stroke="url(#g)" stroke-width="1.2" opacity=".7"/>
    <ellipse rx="42" ry="22" fill="none" stroke="url(#g)" stroke-width="1.6"/>
    <circle r="12" fill="#0b0603" stroke="#d4af37"/><circle r="4" fill="#f7e394"/>
  </g>
  <radialGradient id="v" cx="50%" cy="50%" r="75%"><stop offset="60%" stop-color="#000" stop-opacity="0"/><stop offset="100%" stop-color="#000" stop-opacity=".7"/></radialGradient>
  <rect width="1600" height="900" fill="url(#v)"/>
</svg>
