<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" aria-label="Calavera ornamentada">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#1a0f05"/><stop offset="55%" stop-color="#0a0503"/><stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7e394"/><stop offset="50%" stop-color="#d4af37"/><stop offset="100%" stop-color="#8a6a20"/>
    </linearGradient>
    <linearGradient id="bone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0d68a"/><stop offset="100%" stop-color="#a68030"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4af37" stop-opacity=".35"/><stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="800" cy="450" r="500" fill="url(#halo)"/>

  <!-- Marco ornamental -->
  <rect x="40" y="40" width="1520" height="820" fill="none" stroke="url(#g)" stroke-width="1" opacity=".7"/>
  <rect x="55" y="55" width="1490" height="790" fill="none" stroke="#d4af37" stroke-width=".3" opacity=".5"/>

  <!-- Estrellas dispersas -->
  <g fill="#e8c874">
    <circle cx="160" cy="150" r=".9" opacity=".5"/><circle cx="1440" cy="180" r="1" opacity=".55"/>
    <circle cx="200" cy="700" r=".8" opacity=".5"/><circle cx="1400" cy="720" r="1" opacity=".55"/>
    <circle cx="120" cy="400" r=".7" opacity=".45"/><circle cx="1480" cy="450" r=".7" opacity=".45"/>
  </g>

  <!-- Rosas laterales -->
  <g transform="translate(280 450)" opacity=".85">
    <g stroke="url(#g)" stroke-width=".8" fill="none">
      <circle r="40"/><circle r="28"/><circle r="16"/>
      <path d="M-40,0 Q-20,-25 0,-15 Q20,-25 40,0 Q20,25 0,15 Q-20,25 -40,0 Z"/>
      <path d="M-32,0 Q-16,-18 0,-10 Q16,-18 32,0 Q16,18 0,10 Q-16,18 -32,0 Z"/>
    </g>
    <circle r="5" fill="url(#g)"/>
    <path d="M0,40 L-8,120 M0,40 L8,110" stroke="url(#g)" stroke-width="1" opacity=".7"/>
    <path d="M-30,90 Q-40,85 -35,75 Q-15,85 -8,110" fill="url(#g)" opacity=".3" stroke="url(#g)" stroke-width=".5"/>
    <path d="M30,80 Q40,75 35,65 Q15,75 8,100" fill="url(#g)" opacity=".3" stroke="url(#g)" stroke-width=".5"/>
  </g>
  <g transform="translate(1320 450)" opacity=".85">
    <g stroke="url(#g)" stroke-width=".8" fill="none">
      <circle r="40"/><circle r="28"/><circle r="16"/>
      <path d="M-40,0 Q-20,-25 0,-15 Q20,-25 40,0 Q20,25 0,15 Q-20,25 -40,0 Z"/>
      <path d="M-32,0 Q-16,-18 0,-10 Q16,-18 32,0 Q16,18 0,10 Q-16,18 -32,0 Z"/>
    </g>
    <circle r="5" fill="url(#g)"/>
    <path d="M0,40 L-8,120 M0,40 L8,110" stroke="url(#g)" stroke-width="1" opacity=".7"/>
    <path d="M-30,90 Q-40,85 -35,75 Q-15,85 -8,110" fill="url(#g)" opacity=".3" stroke="url(#g)" stroke-width=".5"/>
    <path d="M30,80 Q40,75 35,65 Q15,75 8,100" fill="url(#g)" opacity=".3" stroke="url(#g)" stroke-width=".5"/>
  </g>

  <!-- Calavera central -->
  <g transform="translate(800 450)">
    <!-- Aureola -->
    <circle r="280" fill="none" stroke="url(#g)" stroke-width=".8" opacity=".4" stroke-dasharray="2 6"/>
    <circle r="240" fill="none" stroke="url(#g)" stroke-width="1.2" opacity=".7"/>

    <!-- Craneo grande -->
    <ellipse rx="150" ry="170" cy="-30" fill="url(#bone)" stroke="url(#g)" stroke-width="1.6"/>

    <!-- Mandibula -->
    <path d="M-100,80 Q-110,150 -60,170 Q0,178 60,170 Q110,150 100,80 Z" fill="url(#bone)" stroke="url(#g)" stroke-width="1.4"/>
    <path d="M-70,90 Q-80,130 -40,140 Q0,145 40,140 Q80,130 70,90" fill="none" stroke="url(#g)" stroke-width=".6" opacity=".6"/>

    <!-- Cuencas oculares -->
    <ellipse cx="-55" cy="-40" rx="34" ry="42" fill="#000"/>
    <ellipse cx="55" cy="-40" rx="34" ry="42" fill="#000"/>

    <!-- Ojos con estrella dorada -->
    <g transform="translate(-55 -40)" fill="url(#g)">
      <polygon points="0,-14 4,-4 14,0 4,4 0,14 -4,4 -14,0 -4,-4" opacity=".85"/>
      <circle r="3" fill="#f7e394"/>
    </g>
    <g transform="translate(55 -40)" fill="url(#g)">
      <polygon points="0,-14 4,-4 14,0 4,4 0,14 -4,4 -14,0 -4,-4" opacity=".85"/>
      <circle r="3" fill="#f7e394"/>
    </g>

    <!-- Nariz -->
    <path d="M-10,10 L0,50 L10,10 Q0,20 -10,10 Z" fill="#000"/>

    <!-- Dientes -->
    <g stroke="url(#g)" stroke-width=".6">
      <path d="M-70,105 L70,105"/>
      <line x1="-58" y1="105" x2="-58" y2="140"/>
      <line x1="-42" y1="105" x2="-42" y2="145"/>
      <line x1="-26" y1="105" x2="-26" y2="148"/>
      <line x1="-10" y1="105" x2="-10" y2="150"/>
      <line x1="10" y1="105" x2="10" y2="150"/>
      <line x1="26" y1="105" x2="26" y2="148"/>
      <line x1="42" y1="105" x2="42" y2="145"/>
      <line x1="58" y1="105" x2="58" y2="140"/>
    </g>

    <!-- Filigrana dorada en la frente -->
    <g stroke="url(#g)" stroke-width=".8" fill="none" opacity=".9">
      <path d="M-80,-150 Q-40,-180 0,-165 Q40,-180 80,-150"/>
      <path d="M-60,-130 Q-30,-145 0,-138 Q30,-145 60,-130"/>
      <circle cx="0" cy="-155" r="6" fill="url(#g)" stroke="none"/>
      <path d="M-40,-100 Q-20,-115 0,-108 Q20,-115 40,-100" opacity=".7"/>
    </g>

    <!-- Ornamentacion lateral del craneo -->
    <g stroke="url(#g)" stroke-width=".7" fill="none" opacity=".8">
      <path d="M-135,-40 Q-155,-10 -140,30 Q-125,10 -130,-20"/>
      <path d="M135,-40 Q155,-10 140,30 Q125,10 130,-20"/>
      <circle cx="-142" cy="-15" r="3" fill="url(#g)" stroke="none"/>
      <circle cx="142" cy="-15" r="3" fill="url(#g)" stroke="none"/>
    </g>

    <!-- Grieta decorativa -->
    <path d="M0,-190 L-8,-160 L4,-140 L-6,-110 L2,-90" stroke="url(#g)" stroke-width=".5" fill="none" opacity=".6"/>
  </g>

  <!-- Alas laterales debajo -->
  <g transform="translate(800 720)" opacity=".7">
    <g fill="none" stroke="url(#g)" stroke-width=".8">
      <path d="M0,0 Q-80,-20 -160,-10 Q-180,10 -160,20 Q-80,15 0,10"/>
      <path d="M0,5 Q-70,-5 -140,5 Q-100,15 -20,15"/>
      <path d="M0,0 Q80,-20 160,-10 Q180,10 160,20 Q80,15 0,10"/>
      <path d="M0,5 Q70,-5 140,5 Q100,15 20,15"/>
    </g>
  </g>

  <!-- Texto -->
  <g text-anchor="middle" fill="#e8c874" font-family="Georgia,serif" opacity=".85">
    <text x="800" y="820" font-size="14" letter-spacing="10">MEMENTO MORI</text>
  </g>

  <radialGradient id="v" cx="50%" cy="50%" r="80%"><stop offset="55%" stop-color="#000" stop-opacity="0"/><stop offset="100%" stop-color="#000" stop-opacity=".75"/></radialGradient>
  <rect width="1600" height="900" fill="url(#v)"/>
</svg>
