<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" aria-label="San La Muerte">
  <defs>
    <radialGradient id="bg" cx="50%" cy="55%" r="80%">
      <stop offset="0%" stop-color="#1a0a05"/><stop offset="55%" stop-color="#0a0402"/><stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7e394"/><stop offset="50%" stop-color="#d4af37"/><stop offset="100%" stop-color="#8a6a20"/>
    </linearGradient>
    <linearGradient id="hood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0a05"/><stop offset="100%" stop-color="#000"/>
    </linearGradient>
    <linearGradient id="bone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0d68a"/><stop offset="100%" stop-color="#a68030"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4af37" stop-opacity=".45"/><stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="8"/></filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Halo -->
  <circle cx="800" cy="360" r="280" fill="url(#halo)" filter="url(#blur)"/>

  <!-- Estrellas y velas laterales -->
  <g fill="#e8c874">
    <circle cx="140" cy="120" r=".9" opacity=".55"/><circle cx="1460" cy="140" r="1" opacity=".6"/>
    <circle cx="320" cy="200" r=".7" opacity=".45"/><circle cx="1280" cy="220" r=".8" opacity=".5"/>
    <circle cx="80" cy="480" r=".9" opacity=".55"/><circle cx="1520" cy="500" r=".7" opacity=".45"/>
  </g>

  <!-- Marco decorativo -->
  <rect x="40" y="40" width="1520" height="820" fill="none" stroke="url(#g)" stroke-width="1" opacity=".7"/>
  <rect x="52" y="52" width="1496" height="796" fill="none" stroke="#d4af37" stroke-width=".3" opacity=".5"/>

  <!-- Aureola detras de la cabeza -->
  <g transform="translate(800 340)">
    <circle r="130" fill="none" stroke="url(#g)" stroke-width="1.4" opacity=".9"/>
    <circle r="140" fill="none" stroke="#d4af37" stroke-width=".4" opacity=".5" stroke-dasharray="2 5"/>
    <g stroke="url(#g)" stroke-width=".7" opacity=".7">
      <line x1="0" y1="-135" x2="0" y2="-160"/><line x1="0" y1="135" x2="0" y2="160"/>
      <line x1="-135" y1="0" x2="-160" y2="0"/><line x1="135" y1="0" x2="160" y2="0"/>
      <line x1="-95" y1="-95" x2="-113" y2="-113"/><line x1="95" y1="-95" x2="113" y2="-113"/>
      <line x1="-95" y1="95" x2="-113" y2="113"/><line x1="95" y1="95" x2="113" y2="113"/>
    </g>
  </g>

  <!-- Figura de San La Muerte centrada -->
  <g transform="translate(800 470)">
    <!-- Capa/túnica -->
    <path d="M-160,340 Q-180,150 -110,-40 Q-70,-90 0,-100 Q70,-90 110,-40 Q180,150 160,340 Z" fill="url(#hood)" stroke="url(#g)" stroke-width="1.4"/>
    <!-- Interior de la capa (sombra) -->
    <path d="M-100,-30 Q-60,-70 0,-75 Q60,-70 100,-30 Q90,20 0,25 Q-90,20 -100,-30 Z" fill="#000"/>

    <!-- Guadaña (mango) -->
    <line x1="-230" y1="-180" x2="230" y2="360" stroke="url(#g)" stroke-width="4" stroke-linecap="round"/>
    <line x1="-230" y1="-180" x2="230" y2="360" stroke="#f7e394" stroke-width="1.2" opacity=".7"/>
    <!-- Hoja de guadaña -->
    <path d="M-230,-180 Q-330,-190 -320,-100 Q-260,-140 -230,-180 Z" fill="url(#g)" stroke="#8a6a20" stroke-width=".6"/>
    <path d="M-230,-180 Q-290,-160 -260,-115" fill="none" stroke="#f7e394" stroke-width=".8" opacity=".8"/>

    <!-- Craneo -->
    <g transform="translate(0 -130)">
      <ellipse rx="55" ry="60" cy="-10" fill="url(#bone)" stroke="url(#g)" stroke-width="1.2"/>
      <!-- mandibula -->
      <path d="M-38,25 Q-42,55 -20,60 Q0,62 20,60 Q42,55 38,25 Z" fill="url(#bone)" stroke="url(#g)" stroke-width="1"/>
      <!-- ojos -->
      <ellipse cx="-20" cy="-10" rx="12" ry="14" fill="#000"/>
      <ellipse cx="20" cy="-10" rx="12" ry="14" fill="#000"/>
      <circle cx="-20" cy="-10" r="3" fill="#d4af37" opacity=".9"/>
      <circle cx="20" cy="-10" r="3" fill="#d4af37" opacity=".9"/>
      <!-- nariz -->
      <path d="M-4,10 L0,25 L4,10 Z" fill="#000"/>
      <!-- dientes -->
      <g stroke="url(#g)" stroke-width=".4">
        <line x1="-24" y1="40" x2="-24" y2="55"/><line x1="-14" y1="40" x2="-14" y2="55"/>
        <line x1="-4" y1="40" x2="-4" y2="55"/><line x1="6" y1="40" x2="6" y2="55"/>
        <line x1="16" y1="40" x2="16" y2="55"/><line x1="24" y1="40" x2="24" y2="55"/>
      </g>
      <path d="M-30,40 L30,40" stroke="url(#g)" stroke-width=".6"/>
    </g>

    <!-- Manos huesudas asomando de la capa -->
    <g fill="url(#bone)" stroke="url(#g)" stroke-width=".6">
      <!-- mano izquierda sujetando guadaña -->
      <ellipse cx="-95" cy="80" rx="18" ry="14"/>
      <line x1="-108" y1="75" x2="-118" y2="65" stroke="url(#bone)" stroke-width="3"/>
      <line x1="-100" y1="70" x2="-108" y2="55" stroke="url(#bone)" stroke-width="3"/>
      <line x1="-92" y1="68" x2="-95" y2="52" stroke="url(#bone)" stroke-width="3"/>
      <!-- mano derecha -->
      <ellipse cx="95" cy="90" rx="16" ry="12"/>
    </g>

    <!-- Corazon dorado en el pecho -->
    <g transform="translate(0 30)">
      <path d="M0,15 C-14,0 -28,0 -28,-10 C-28,-20 -14,-22 0,-8 C14,-22 28,-20 28,-10 C28,0 14,0 0,15 Z" fill="url(#g)" opacity=".85"/>
      <path d="M0,15 C-14,0 -28,0 -28,-10 C-28,-20 -14,-22 0,-8 C14,-22 28,-20 28,-10 C28,0 14,0 0,15 Z" fill="none" stroke="#8a6a20" stroke-width=".6"/>
    </g>

    <!-- Detalles de la tunica (líneas) -->
    <g stroke="url(#g)" stroke-width=".5" opacity=".5" fill="none">
      <path d="M-120,50 Q-100,150 -110,300"/>
      <path d="M120,50 Q100,150 110,300"/>
      <path d="M-60,80 Q-50,180 -55,320"/>
      <path d="M60,80 Q50,180 55,320"/>
    </g>
  </g>

  <!-- Texto inferior -->
  <g text-anchor="middle" fill="#e8c874" font-family="Georgia,serif" opacity=".85">
    <text x="800" y="820" font-size="16" letter-spacing="12">SAN LA MUERTE</text>
    <text x="800" y="842" font-size="10" letter-spacing="4" opacity=".7">✦ PROTECCIÓN · JUSTICIA ✦</text>
  </g>

  <radialGradient id="v" cx="50%" cy="50%" r="80%"><stop offset="55%" stop-color="#000" stop-opacity="0"/><stop offset="100%" stop-color="#000" stop-opacity=".75"/></radialGradient>
  <rect width="1600" height="900" fill="url(#v)"/>
</svg>
