<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" preserveAspectRatio="xMidYMid slice" aria-label="Lectura de tarot">
  <defs>
    <radialGradient id="bg" cx="50%" cy="55%" r="70%">
      <stop offset="0%" stop-color="#1a1005"/><stop offset="60%" stop-color="#0a0503"/><stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7e394"/><stop offset="50%" stop-color="#d4af37"/><stop offset="100%" stop-color="#8a6a20"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1408"/><stop offset="100%" stop-color="#0a0704"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4af37" stop-opacity=".35"/><stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="6"/></filter>
    <symbol id="tc" viewBox="0 0 100 160">
      <rect x="2" y="2" width="96" height="156" rx="6" fill="url(#card)" stroke="url(#g)" stroke-width="1.6"/>
      <rect x="7" y="7" width="86" height="146" rx="3" fill="none" stroke="#d4af37" stroke-width=".5" opacity=".6"/>
      <circle cx="50" cy="52" r="20" fill="none" stroke="url(#g)" stroke-width="1"/>
      <polygon points="50,34 56,52 50,70 44,52" fill="url(#g)" opacity=".85"/>
      <circle cx="50" cy="52" r="3" fill="#f7e394"/>
      <text x="50" y="115" text-anchor="middle" font-family="Georgia,serif" font-size="12" fill="#e8c874">✦</text>
      <text x="50" y="138" text-anchor="middle" font-family="Georgia,serif" font-size="7" fill="#d4af37" letter-spacing="1.5" opacity=".8">ARCANA</text>
    </symbol>
  </defs>

  <rect width="400" height="400" fill="url(#bg)"/>
  <circle cx="200" cy="220" r="240" fill="url(#glow)" filter="url(#blur)"/>

  <!-- Estrellas dispersas -->
  <g fill="#e8c874">
    <circle cx="40" cy="50" r="1" opacity=".55"/><circle cx="360" cy="60" r="1.1" opacity=".6"/>
    <circle cx="80" cy="30" r=".8" opacity=".5"/><circle cx="320" cy="30" r=".9" opacity=".55"/>
    <circle cx="30" cy="200" r=".7" opacity=".45"/><circle cx="370" cy="220" r=".9" opacity=".55"/>
    <circle cx="60" cy="370" r=".8" opacity=".5"/><circle cx="340" cy="360" r="1" opacity=".6"/>
    <circle cx="200" cy="30" r="1" opacity=".6"/>
  </g>

  <!-- Anillo místico detrás -->
  <g transform="translate(200 220)">
    <circle r="160" fill="none" stroke="url(#g)" stroke-width=".6" opacity=".4" stroke-dasharray="2 6"/>
    <circle r="140" fill="none" stroke="url(#g)" stroke-width="1" opacity=".55"/>
  </g>

  <!-- Abanico de 5 cartas -->
  <g transform="translate(200 240)">
    <g transform="rotate(-32) translate(-50 -20)"><use href="#tc" width="100" height="160"/></g>
    <g transform="rotate(-16) translate(-50 -50)"><use href="#tc" width="100" height="160"/></g>
    <g transform="translate(-50 -70)"><use href="#tc" width="100" height="160"/></g>
    <g transform="rotate(16) translate(-50 -50)"><use href="#tc" width="100" height="160"/></g>
    <g transform="rotate(32) translate(-50 -20)"><use href="#tc" width="100" height="160"/></g>
  </g>

  <!-- Luna arriba izquierda -->
  <g transform="translate(70 100)" opacity=".85">
    <circle r="18" fill="none" stroke="url(#g)" stroke-width=".8"/>
    <path d="M-6,-13 A16,16 0 1 0 -6,13 A13,13 0 1 1 -6,-13 Z" fill="url(#g)"/>
  </g>

  <!-- Sol arriba derecha -->
  <g transform="translate(330 100)" opacity=".85">
    <circle r="14" fill="none" stroke="url(#g)" stroke-width="1"/>
    <circle r="6" fill="url(#g)"/>
    <g stroke="url(#g)" stroke-width=".8">
      <line x1="0" y1="-20" x2="0" y2="-26"/><line x1="0" y1="20" x2="0" y2="26"/>
      <line x1="-20" y1="0" x2="-26" y2="0"/><line x1="20" y1="0" x2="26" y2="0"/>
      <line x1="-14" y1="-14" x2="-19" y2="-19"/><line x1="14" y1="-14" x2="19" y2="-19"/>
      <line x1="-14" y1="14" x2="-19" y2="19"/><line x1="14" y1="14" x2="19" y2="19"/>
    </g>
  </g>

  <!-- Humo sutil en la base -->
  <ellipse cx="200" cy="380" rx="180" ry="20" fill="#d4af37" opacity=".08"/>

  <!-- Vignette -->
  <radialGradient id="v" cx="50%" cy="50%" r="75%"><stop offset="60%" stop-color="#000" stop-opacity="0"/><stop offset="100%" stop-color="#000" stop-opacity=".7"/></radialGradient>
  <rect width="400" height="400" fill="url(#v)"/>
</svg>
