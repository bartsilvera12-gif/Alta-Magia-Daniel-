  <style>

    :root {

    .card {

    .card .body { padding: 18px 20px 22px; display: flex; flex-direction: column; flex: 1; }

    .card p { font-size: 16px; line-height: 1.55; color: var(--text); margin-top: 10px; flex: 1; }
    .card .cta {

    .card .cta .wa { display: inline-flex; width: 22px; height: 22px; border-radius: 50%; background: #25d366; align-items: center; justify-content: center; }

    .corner { position: absolute; width: 22px; height: 22px; pointer-events: none; z-index: 3; }
    .corner.tl { top: 8px; left: 8px; border-top: 1.5px solid var(--gold); border-left: 1.5px solid var(--gold); border-top-left-radius: 8px; }
    .corner.tr { top: 8px; right: 8px; border-top: 1.5px solid var(--gold); border-right: 1.5px solid var(--gold); border-top-right-radius: 8px; }
    .corner.bl { bottom: 8px; left: 8px; border-bottom: 1.5px solid var(--gold); border-left: 1.5px solid var(--gold); border-bottom-left-radius: 8px; }
